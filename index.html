<style>
  :root {
    --panel: rgba(19, 21, 27, 0.9);
    --border: rgba(255, 255, 255, 0.1);
    --frame-border: rgba(255, 255, 255, 0.12);
    --text: #f5f7fb;
    --muted: #8e96ad;
    --soft: rgba(255, 255, 255, 0.06);
    --accent: #ff845c;
    --danger: #f1f1f1;
    --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    height: 100dvh;
    overflow: hidden;
    background:
      radial-gradient(circle at top left, rgba(255, 132, 92, 0.18), transparent 28%),
      radial-gradient(circle at bottom right, rgba(247, 198, 107, 0.14), transparent 24%),
      linear-gradient(135deg, #090a0d 0%, #10121a 52%, #0d0f14 100%);
    color: var(--text);
    font-family: "Space Grotesk", sans-serif;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
    background-size: 44px 44px;
    opacity: 0.25;
  }

  #root {
    height: 100dvh;
  }

  .app-shell {
    display: grid;
    grid-template-columns: 400px minmax(0, 1fr);
    height: 100dvh;
  }

  .editor-panel {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 18px 18px 16px;
    background: var(--panel);
    backdrop-filter: blur(18px);
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .logo {
    font-family: "JetBrains Mono", monospace;
    font-size: 1.72rem;
    font-weight: 800;
    letter-spacing: -0.04em;
  }

  .logo span {
    color: var(--accent);
  }

  .subcopy {
    max-width: 28ch;
    color: var(--muted);
    line-height: 1.36;
    font-size: 0.82rem;
  }

  .editor-card {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 12px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
  }

  .editor-section,
  .setting-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .editor-label,
  .setting-row label {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .editor-textarea,
  .editor-input,
  .slider-value {
    font-family: "JetBrains Mono", monospace;
  }

  .editor-textarea,
  .editor-input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(7, 8, 12, 0.9);
    color: var(--text);
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s ease, transform 0.2s ease;
  }

  .editor-textarea {
    min-height: 86px;
    resize: vertical;
    line-height: 1.45;
    font-size: 0.78rem;
  }

  .editor-input {
    font-size: 0.74rem;
  }

  .editor-textarea:focus,
  .editor-input:focus {
    border-color: rgba(255, 132, 92, 0.55);

  }

  .settings-grid {

    grid-template-columns: 1fr 1fr;

  }

  .range-wrap {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;

  .slider-value {
    min-width: 54px;
    padding: 7px 9px;
    border-radius: 999px;
    text-align: center;
    font-size: 0.7rem;

    border: 1px solid var(--border);
  }

  .button-row {
    display: grid;
    grid-template-columns: 1fr 1fr;

  .btn {
    appearance: none;
    border: none;
    border-radius: 12px;

  .btn-primary {

  .terminal-frame {

    --canvas-accent-b: rgba(247, 198, 107, 0.12);

    --window-border: rgba(255, 255, 255, 0.12);
    --window-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
    --titlebar-bg: rgba(63, 63, 66, 0.92);
    --titlebar-border: rgba(255, 255, 255, 0.09);
    --titlebar-text: rgba(255, 255, 255, 0.72);
    --terminal-body-bg: rgba(34, 34, 35, 0.98);
    --terminal-text: #f5f7fb;
    --user-highlight-bg: #57595d;
    --composer-line: rgba(255, 255, 255, 0.26);
    --caret: rgba(255, 255, 255, 0.95);
    --footer-text: rgba(255, 255, 255, 0.42);
    --watermark-text: rgba(255, 255, 255, 0.52);

    height: 1080px;

    background:

    font-family: "JetBrains Mono", monospace;

  .terminal-frame.theme-light {
    --canvas-base: linear-gradient(180deg, #f6f1e8 0%, #efe6da 54%, #e6ddd0 100%);
    --canvas-accent-a: rgba(255, 132, 92, 0.14);

    --footer-text: rgba(97, 74, 45, 0.56);

  .terminal-frame::before {
    content: "";

    inset: 0;

  .terminal-stack {
    display: flex;

  .terminal-window {

  .title-bar {
    position: relative;
    display: flex;

  .traffic-lights {

  .dot {

  .dot.close { background: #ff5f57; }
  .dot.minimize { background: #febc2e; }

  .title-text {

  .terminal-body {

  .chat-block {

  .chat-icon {

  .chat-icon.user {

  .chat-copy {

  .user-highlight {
    display: inline;

  .composer {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 6px;

  .composer-line {
    height: 2px;

  .composer-row {
    display: flex;
    align-items: center;

  .composer-prompt {

  .canvas-wordmark {

  .canvas-wordmark span {

  .toast {

    right: 24px;
    bottom: 24px;
    z-index: 30;
    padding: 12px 18px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(98, 211, 148, 0.95), rgba(181, 240, 168, 0.95));
    color: #0c1b11;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.76rem;

  .toast.show {

  .export-root {

  @media (max-width: 1100px) {
    body {
      height: auto;

    #root {

    }

    }

      padding: 10px;

<body>
<div id="root"></div>

<script type="text/babel">
const { useEffect, useRef, useState } = React;

const DEFAULTS = {
  userText: "our landing page looks like generic ai drivel",
  claudeText: "You're right on both counts. The animations are gone above the fold now, but the real problem is the content itself — generic copy, generic layout, generic card mockup. It reads like every other SaaS landing page.",
  fontSize: 26,
  theme: "light",
  titleText: "~/projects/app — claude",
  leftSideText: "? for shortcuts",
  watermarkText: "Thinking off",
};

function TerminalCanvas({
  frameRef,
  terminalWindowRef,
  userText,
  claudeText,
  fontSize,
  theme,
  titleText,
  leftSideText,
  watermarkText,
}) {
  return (
    <div className={`terminal-frame theme-${theme}`} ref={frameRef}>
      <div className="export-shell">
        <div className="terminal-stack">
          <div className="terminal-window" ref={terminalWindowRef}>
            <div className="title-bar">
              <div className="traffic-lights">
                <div className="dot close" />
                <div className="dot minimize" />
                <div className="dot maximize" />
              </div>
              <div className="title-text">{titleText}</div>
            </div>

            <div className="terminal-body">
              <div className="chat-block" style={{ fontSize: `${fontSize}px` }}>
                <div className="chat-icon user">❯</div>
                <div className="chat-copy">
                  <span className="user-highlight">{userText || "\u00A0"}</span>
                </div>
              </div>

              <div className="chat-block" style={{ fontSize: `${fontSize}px` }}>
                <div className="chat-icon claude">●</div>
                <div className="chat-copy">{claudeText || "\u00A0"}</div>
              </div>

              <div className="composer">
                <div className="composer-line" />
                <div className="composer-row">
                  <div className="composer-prompt">❯</div>
                  <div className="composer-caret" />
                </div>
                <div className="composer-line" />
                <div className="footer-bar">
                  <div className="footer-left">{leftSideText || "\u00A0"}</div>
                  <div className="watermark">{watermarkText || "\u00A0"}</div>
                </div>
              </div>
            </div>
          </div>

          <div className="canvas-wordmark">
            @claude<span>cooked</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [userText, setUserText] = useState(DEFAULTS.userText);
  const [claudeText, setClaudeText] = useState(DEFAULTS.claudeText);
  const [fontSize, setFontSize] = useState(DEFAULTS.fontSize);
  const [theme, setTheme] = useState(DEFAULTS.theme);
  const [titleText, setTitleText] = useState(DEFAULTS.titleText);
  const [leftSideText, setLeftSideText] = useState(DEFAULTS.leftSideText);
  const [watermarkText, setWatermarkText] = useState(DEFAULTS.watermarkText);
  const [showToast, setShowToast] = useState(false);
  const [scale, setScale] = useState(0.5);
  const exportFrameRef = useRef(null);
  const exportTerminalWindowRef = useRef(null);
  const previewRef = useRef(null);
  const toastTimerRef = useRef(null);

  useEffect(() => {
    function computeScale() {
      if (!previewRef.current) return;
      const rect = previewRef.current.getBoundingClientRect();
      const availableWidth = rect.width - 120;
      const availableHeight = rect.height - 120;
      const nextScale = Math.min(availableWidth / 1080, availableHeight / 1080, 1);
      setScale(Math.max(nextScale, 0.2));
    }

    computeScale();
    window.addEventListener("resize", computeScale);
    return () => window.removeEventListener("resize", computeScale);
  }, []);

  useEffect(() => {
    return () => {
      if (toastTimerRef.current) {
        window.clearTimeout(toastTimerRef.current);
      }
    };
  }, []);

  async function handleDownload() {
    if (!exportFrameRef.current) return;

    const terminalWindow = exportTerminalWindowRef.current;
    let restoreWidth = "";
    let restoreHeight = "";
    let restoreMinWidth = "";

    try {
      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
      }

      await new Promise((resolve) => requestAnimationFrame(() => resolve()));
      await new Promise((resolve) => requestAnimationFrame(() => resolve()));

      if (terminalWindow) {
        const measuredWidth = Math.max(
          terminalWindow.offsetWidth,
          terminalWindow.scrollWidth
        );
        const measuredHeight = Math.max(
          terminalWindow.offsetHeight,
          terminalWindow.scrollHeight
        );
        restoreWidth = terminalWindow.style.width;
        restoreHeight = terminalWindow.style.height;
        restoreMinWidth = terminalWindow.style.minWidth;
        terminalWindow.style.width = `${Math.ceil(measuredWidth)}px`;
        terminalWindow.style.height = `${Math.ceil(measuredHeight)}px`;
        terminalWindow.style.minWidth = `${Math.ceil(measuredWidth)}px`;
      }

      const canvas = await html2canvas(exportFrameRef.current, {
        backgroundColor: theme === "light" ? "#f6f1e8" : "#0b0d12",
        scale: 2,
        width: 1080,
        height: 1080,
        scrollX: 0,
        scrollY: 0,
        windowWidth: 1080,
        windowHeight: 1080,
        useCORS: true,
      });

      const link = document.createElement("a");
      link.download = `claudecooked_${Date.now()}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();

      setShowToast(true);
      if (toastTimerRef.current) {
        window.clearTimeout(toastTimerRef.current);
      }
      toastTimerRef.current = window.setTimeout(() => {
        setShowToast(false);
      }, 2200);
    } catch (error) {
      alert("Export failed: " + error.message);
    } finally {
      if (terminalWindow) {
        terminalWindow.style.width = restoreWidth;
        terminalWindow.style.height = restoreHeight;
        terminalWindow.style.minWidth = restoreMinWidth;
      }
    }
  }

  function handleReset() {
    setUserText(DEFAULTS.userText);
    setClaudeText(DEFAULTS.claudeText);
    setFontSize(DEFAULTS.fontSize);
    setTheme(DEFAULTS.theme);
    setTitleText(DEFAULTS.titleText);
    setLeftSideText(DEFAULTS.leftSideText);
    setWatermarkText(DEFAULTS.watermarkText);
  }

  return (
    <>
      <div className="app-shell">
        <aside className="editor-panel">
          <div className="brand">
            <div className="logo">claude<span>cooked</span></div>
            <p className="subcopy">
              git blame claude
            </p>
          </div>

          <section className="editor-card">
            <div className="editor-section">
              <div className="editor-label">Your prompt</div>
              <textarea
                className="editor-textarea"
                value={userText}
                onChange={(event) => setUserText(event.target.value)}
                placeholder="type the request..."
              />
            </div>

            <div className="editor-section">
              <div className="editor-label">Claude's response</div>
              <textarea
                className="editor-textarea"
                value={claudeText}
                onChange={(event) => setClaudeText(event.target.value)}
                placeholder="type the response..."
              />
            </div>
          </section>

          <section className="editor-card">
            <div className="settings-grid">
              <div className="setting-row">
                <label>Theme</label>
                <select
                  className="editor-input"
                  value={theme}
                  onChange={(event) => setTheme(event.target.value)}
                >
                  <option value="light">Light</option>
                  <option value="dark">Dark</option>
                </select>
              </div>

              <div className="setting-row">
                <label>Window title</label>
                <input
                  className="editor-input"
                  type="text"
                  value={titleText}
                  onChange={(event) => setTitleText(event.target.value)}
                />
              </div>

              <div className="setting-row">
                <label>Left side text</label>
                <input
                  className="editor-input"
                  type="text"
                  value={leftSideText}
                  onChange={(event) => setLeftSideText(event.target.value)}
                />
              </div>

              <div className="setting-row">
                <label>Right side text</label>
                <input
                  className="editor-input"
                  type="text"
                  value={watermarkText}
                  onChange={(event) => setWatermarkText(event.target.value)}
                />
              </div>
            </div>

            <div className="setting-row">
              <label>Type size</label>
              <div className="range-wrap">
                <input
                  type="range"
                  min="20"
                  max="36"
                  step="1"
                  value={fontSize}
                  onChange={(event) => setFontSize(Number(event.target.value))}
                />
                <div className="slider-value">{fontSize}px</div>
              </div>
            </div>

            <div className="button-row">
              <button type="button" className="btn btn-primary" onClick={handleDownload}>
                Download PNG
              </button>
              <button type="button" className="btn btn-secondary" onClick={handleReset}>
                Reset
              </button>
            </div>
          </section>

          <p className="helper-text">
            The background stays square, while the terminal window sizes itself to the conversation.
          </p>
        </aside>

        <main className="preview-panel">
          <div className="preview-stage" ref={previewRef}>
            <div className="preview-scaler" style={{ transform: `scale(${scale})` }}>
              <TerminalCanvas
                userText={userText}
                claudeText={claudeText}
                fontSize={fontSize}
                theme={theme}
                titleText={titleText}
                leftSideText={leftSideText}
                watermarkText={watermarkText}
              />
            </div>
          </div>
        </main>
      </div>

      <div className="export-root" aria-hidden="true">
        <TerminalCanvas
          frameRef={exportFrameRef}
          terminalWindowRef={exportTerminalWindowRef}
          userText={userText}
          claudeText={claudeText}
          fontSize={fontSize}
          theme={theme}
          titleText={titleText}
          leftSideText={leftSideText}
          watermarkText={watermarkText}
        />
      </div>

      <div className={`toast ${showToast ? "show" : ""}`}>
        export ready. post the evidence.
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
